<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Cards</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <script src="scripts.js"></script>
    <script>loadDraftmancerCards();</script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="cc-body">
    <header class="cc-topbar">
        <div class="cc-topbar-inner">
            <a class="cc-brand" href="customcards.html">Custom Cards</a>
            <form id="search-form" class="cc-search" hidden onsubmit="event.preventDefault(); loadSearchResults(document.getElementById('search-input').value.trim());">
                <input type="search" id="search-input" placeholder="Search cards…" aria-label="Search cards" />
                <button type="submit">Search</button>
            </form>
        </div>
    </header>

    <nav class="cc-subbar">
        <div class="cc-subbar-inner">
            <div class="cc-tabs-group">
                <span class="cc-tabs-label">Custom Card Lists</span>
                <div id="tabs" class="cc-tabs"></div>
            </div>
            <div class="cc-tabs-group">
                <span class="cc-tabs-label">Draftable Sets</span>
                <div id="tabs-draftable" class="cc-tabs"></div>
            </div>
        </div>
    </nav>

    <main class="cc-main">
        <div class="cc-results-header">
            <div class="cc-results-count">
                <h1 id="cardset-title"></h1>
                <p id="query-description" hidden></p>
            </div>
            <div id="results-controls" class="cc-results-controls" hidden>
                <div class="cc-control">
                    <select id="unique-select" class="cc-control-select" onchange="setUnique(this.value);">
                        <option value="cards">Cards</option>
                        <option value="prints">Prints</option>
                    </select>
                    <span class="cc-control-label">as</span>
                    <select id="view-select" class="cc-control-select" onchange="setViewMode(this.value);">
                        <option value="grid">Images</option>
                        <option value="full">Full</option>
                    </select>
                    <span class="cc-control-label">sorted by</span>
                    <select id="sort-order" class="cc-control-select" onchange="setSortOrder(this.value);">
                        <option value="default">Default</option>
                        <option value="name">Name</option>
                        <option value="set">Set / Number</option>
                        <option value="rarity">Rarity</option>
                        <option value="cmc">Mana Value</option>
                        <option value="power">Power</option>
                        <option value="toughness">Toughness</option>
                        <option value="released">Released</option>
                        <option value="artist">Artist</option>
                    </select>
                    <span class="cc-control-label">:</span>
                    <select id="sort-direction" class="cc-control-select" onchange="setSortDirection(this.value);">
                        <option value="auto">Auto</option>
                        <option value="asc">Asc</option>
                        <option value="desc">Desc</option>
                    </select>
                </div>
                <span id="download-button"></span>
            </div>
        </div>

        <div id="loading" class="cc-loading" role="status" aria-label="Loading cards">
            <div class="cc-spinner"></div>
        </div>

        <div id="cardtable" class="cc-card-grid"></div>
    </main>
</body>
</html>
